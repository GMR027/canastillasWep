replicaCount: 1

volume:
  name: 'shared-volume'
  mountPath: /var/www/public/image
  storageClassName: ''
  accessMode: ReadWriteMany
  size: 8Gi

config:
  ENV: production
  DB_HOST: mysql.canastillas.svc.cluster.local
  DB_NAME: canastillas
  DB_USER: canastillas
  DB_PASSWORD: canastillas

image:
  registry: christopherguzman
  repository: canastillas
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  externalPort: 80
  internalPort: 80

ingress:
  enabled: true
  hosts:
    - canastillas.iguzman.com.mx
    - canastillasdelabaja.com
    - www.canastillasdelabaja.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

deployment:
  nodeSelector:
    nodeProjects: 'real-clients'
