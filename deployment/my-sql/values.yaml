replicaCount: 1
volumeMountPath: 'shared-master'

config:
  MYSQL_DATABASE: canastillas
  MYSQL_ROOT_PASSWORD: canastillas
  MYSQL_USER: canastillas
  MYSQL_PASSWORD: canastillas

image:
  registry: docker.io
  repository: mysql
  tag: 8
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  externalPort: 3306
  internalPort: 3306

ingress:
  enabled: false

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

deployment:
  nodeSelector:
    nodeName: master
