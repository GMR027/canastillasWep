apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.internalPort }}
        {{- if .Values.config }}
        env:
        {{- range $key, $value := .Values.config }}
        - name: {{ $key }}
          valueFrom:
            configMapKeyRef:
              name: {{ $.Chart.Name }}
              key: {{ $key }}
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        startupProbe:
          exec:
            command:
            - test
            - -f
            - /var/www/public/image/.healthy
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - test
            - -f
            - /var/www/public/image/.healthy
          periodSeconds: 10
        {{- if .Values.volume }}
        volumeMounts:
        - name: {{ .Values.volume.name }}
          mountPath: {{ .Values.volume.mountPath }}
        {{- end }}
        lifecycle:
          postStart:
            exec:
              command:
                - "sh"
                - "-c"
                - "touch {{ .Values.volume.mountPath }}/.healthy"
      {{- if .Values.volume }}
      volumes:
      - name: {{ .Values.volume.name }}
        hostPath:
          path: {{ .Values.volume.hostPath }}/{{ .Release.Namespace }}/media
          type: DirectoryOrCreate
      {{- end }}
      nodeSelector:
          {{- toYaml .Values.deployment.nodeSelector | nindent 12 }}
